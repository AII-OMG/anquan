<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f5f5f7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="安管刷题">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<title>湖南省建筑施工企业"安管人员"安全生产考核刷题系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--text2:#86868b;--border:rgba(0,0,0,.07);
    --primary:#0071e3;--primary-hover:#0077ed;--success:#30b158;--danger:#ff3b30;--warning:#ff9f0a;
    --tag-bg:#f2f5fd;--radius-sm:12px;--radius:16px;--radius-lg:22px;
    --glow:radial-gradient(900px 380px at 50% -140px,rgba(0,113,227,.09),transparent 70%);
    --header-bg:rgba(255,255,255,.72);
    --shadow:0 1px 2px rgba(0,0,0,.04),0 10px 30px rgba(0,0,0,.05);
}
[data-theme=dark]{
    --bg:#0b0b0d;--card:#1c1c1e;--text:#f5f5f7;--text2:#98989d;--border:rgba(255,255,255,.09);
    --primary:#2997ff;--primary-hover:#40a4ff;--tag-bg:#1a2a3a;
    --glow:radial-gradient(900px 380px at 50% -140px,rgba(41,151,255,.14),transparent 70%);
    --header-bg:rgba(22,22,24,.72);
    --shadow:0 1px 2px rgba(0,0,0,.5),0 10px 30px rgba(0,0,0,.4);
}
[data-theme=eye]{
    --bg:#e8f0e3;--card:#f7fbf4;--text:#1d281a;--text2:#6b7a65;--border:rgba(0,0,0,.06);
    --primary:#3a8c3f;--primary-hover:#2d7032;--success:#3a8c3f;--danger:#c0392b;--warning:#c77d16;
    --tag-bg:#e2f0dc;
    --glow:radial-gradient(900px 380px at 50% -140px,rgba(58,140,63,.10),transparent 70%);
    --header-bg:rgba(247,251,244,.72);
}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;-webkit-tap-highlight-color:transparent}
body::before{content:'';position:fixed;inset:0;background:var(--glow);pointer-events:none;z-index:0}
.container{max-width:1040px;margin:0 auto;padding:20px 24px calc(40px + env(safe-area-inset-bottom));position:relative;z-index:1}
.header{background:var(--header-bg);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:100}
.header h1{font-size:16px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.header-actions{display:flex;gap:10px;align-items:center}
.btn{padding:9px 20px;border:none;border-radius:980px;cursor:pointer;font-size:13px;transition:background .25s,color .25s,border-color .25s,transform .15s,opacity .25s,box-shadow .25s;font-weight:500}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 14px rgba(0,113,227,.28)}.btn-primary:hover{background:var(--primary-hover)}
.btn-outline{background:var(--card);border:1px solid var(--border);color:var(--text)}.btn-outline:hover{background:var(--bg)}
.btn-sm{padding:5px 14px;font-size:11px}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-warning{background:var(--warning);color:#fff}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important}
.nav-tabs{display:flex;gap:5px;margin:8px 0 4px;flex-wrap:wrap}
.nav-tab{padding:7px 16px;border-radius:980px;cursor:pointer;background:var(--card);border:1px solid var(--border);font-size:11px;font-weight:500;transition:all .25s cubic-bezier(.25,.1,.25,1);white-space:nowrap;color:var(--text)}
.nav-tab.active{background:var(--text);color:var(--card);border-color:var(--text)}
.nav-tab:hover:not(.active){background:var(--bg)}
.card{background:var(--card);border-radius:var(--radius-lg);padding:20px;margin:10px 0;box-shadow:var(--shadow);border:1px solid var(--border)}
.card-header{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:6px;margin:6px 0}
.stat-card{background:var(--card);border-radius:var(--radius);padding:6px 10px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--border)}
.stat-num{font-size:16px;font-weight:700;color:var(--text);line-height:1.15}
.stat-label{font-size:10px;color:var(--text2);margin-top:1px;font-weight:500;letter-spacing:0}
.question-stem{font-size:15px;line-height:1.65;margin-bottom:14px;padding:16px 18px;background:var(--bg);border-radius:var(--radius);animation:fadeUp .28s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.question-stem .q-num{color:var(--primary);font-weight:600;font-size:14px}
.option-item{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;margin:6px 0;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:border-color .2s,background .2s;font-size:14px;line-height:1.5;background:var(--card);user-select:none}
.option-item.correct::after{content:'✓';margin-left:auto;font-weight:700;color:var(--success);flex-shrink:0}
.option-item.wrong::after{content:'✕';margin-left:auto;font-weight:700;color:var(--danger);flex-shrink:0}
.option-item:hover{border-color:rgba(0,0,0,.2);background:var(--bg)}
.option-item.selected{border-color:var(--primary);background:rgba(0,113,227,.04)}
.option-item.correct{border-color:var(--success);background:rgba(48,177,88,.06)}
.option-item.wrong{border-color:var(--danger);background:rgba(255,59,48,.05)}
.option-item .opt-label{font-weight:600;min-width:22px;color:var(--primary);font-size:14px}
.option-item.correct .opt-label{color:var(--success)}
.option-item.wrong .opt-label{color:var(--danger)}
.explanation-box{margin-top:16px;padding:16px 20px;background:rgba(255,159,10,.06);border-radius:var(--radius-sm);border-left:3px solid var(--warning);font-size:14px;line-height:1.6}
.explanation-box .exp-title{font-weight:600;margin-bottom:6px;color:#b06800;font-size:13px}
.answer-display{margin-top:10px;padding:10px 16px;border-radius:var(--radius-sm);font-weight:600;font-size:14px}
.answer-display.correct-ans{background:rgba(48,177,88,.08);color:var(--success)}
.answer-display.wrong-ans{background:rgba(255,59,48,.06);color:var(--danger)}
.action-bar{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:10px 0}
.progress-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .5s cubic-bezier(.25,.1,.25,1)}
.timer{font-size:28px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--text)}
.timer.warning{color:var(--danger);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.4}}
.search-box{width:100%;padding:7px 16px;border:1.5px solid var(--border);border-radius:980px;font-size:13px;margin:4px 0;background:var(--card);transition:all .25s}
.search-box:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(0,113,227,.08)}
.tag{display:inline-block;padding:3px 12px;border-radius:980px;font-size:11px;font-weight:500;background:var(--tag-bg);color:var(--primary);margin:2px;letter-spacing:0}
.tag-judge{background:rgba(0,113,227,.08);color:#0071e3}
.tag-single{background:rgba(48,177,88,.08);color:#30b158}
.tag-multi{background:rgba(255,59,48,.08);color:#ff3b30}
.type-filter-btn{display:inline-block;padding:8px 18px;border-radius:980px;cursor:pointer;font-size:12px;font-weight:500;transition:all .25s cubic-bezier(.25,.1,.25,1);border:1.5px solid var(--border);user-select:none;background:var(--card);color:var(--text)}
.type-filter-btn:hover{transform:scale(1.03)}
.type-filter-all.active,.type-filter-all:hover{background:var(--text);color:var(--card);border-color:var(--text)}
.type-filter-judge.active,.type-filter-judge:hover{background:#0071e3;color:#fff;border-color:#0071e3;box-shadow:0 4px 20px rgba(0,113,227,.25)}
.type-filter-single.active,.type-filter-single:hover{background:#30b158;color:#fff;border-color:#30b158;box-shadow:0 4px 20px rgba(48,177,88,.25)}
.type-filter-multi.active,.type-filter-multi:hover{background:#ff3b30;color:#fff;border-color:#ff3b30;box-shadow:0 4px 20px rgba(255,59,48,.25)}
.wrong-list-item{padding:14px 18px;border-bottom:1px solid var(--border);cursor:pointer;font-size:14px;transition:background .15s}
.wrong-list-item:hover{background:var(--bg)}
.hidden{display:none!important}
.sheet-num{width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);color:var(--text2);transition:all .15s;flex-shrink:0}
.sheet-num.answered{background:var(--primary);border-color:var(--primary);color:#fff}
.sheet-num.current{box-shadow:0 0 0 3px var(--warning)}
.load-banner{display:flex;align-items:center;gap:8px;padding:9px 16px;margin:8px 0;border-radius:var(--radius-sm);background:rgba(0,113,227,.07);color:var(--primary);font-size:12px;font-weight:500}
.load-banner .mini-spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
.load-banner.error{background:rgba(255,59,48,.08);color:var(--danger);cursor:pointer}
.load-banner.error .mini-spinner{display:none}
.footer-quote{text-align:center;font-size:12px;color:var(--text2);font-weight:500;margin:28px 0 4px;letter-spacing:.02em}
.footer-note{text-align:center;font-size:11px;color:var(--text2);opacity:.55;margin:0 0 8px}
.exam-opts{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin:16px 0}
.exam-opts label{font-size:13px;color:var(--text2);display:block;margin-bottom:6px}
.exam-opts select{padding:10px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border);font-size:14px;background:var(--card);color:var(--text);min-width:140px}
@media(max-width:700px){
.header{padding:8px 12px}
.header h1{font-size:14px}
.container{padding:8px 10px calc(32px + env(safe-area-inset-bottom))}
#categoryTabs{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin:6px 0 0}
#modeTabs{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin:5px 0 0}
.nav-tab{padding:7px 1px;font-size:10.5px;text-align:center;white-space:nowrap}
.stats-row{grid-template-columns:repeat(4,1fr);gap:5px;margin:4px 0}
.stat-card{padding:5px 3px;border-radius:10px}
.stat-num{font-size:13px}
.stat-label{font-size:9px;margin-top:1px}
.card{padding:12px;border-radius:var(--radius);margin:8px 0}
.question-stem{padding:12px 14px;margin-bottom:10px}
.search-box{font-size:16px;padding:8px 14px;margin:3px 0}
.option-item{font-size:14px;padding:13px 13px}
.action-bar{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.action-bar .btn{margin:0;min-height:42px;font-size:13px}
.action-bar #submitBtn,.action-bar #wrongBookBtn{grid-column:1/-1}
.qnav-num{width:32px;height:32px;font-size:11px;border-radius:8px}
.qnav-arrow{width:28px;height:28px}
.sheet-num{width:38px;height:38px}
.timer{font-size:22px}
.result-score{font-size:60px}
.qnav-jump{font-size:16px;width:88px;padding:6px 10px}
.type-filter-btn{padding:6px 10px;font-size:11px;flex-shrink:0}
#typeFilter{flex-wrap:nowrap!important;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#typeFilter::-webkit-scrollbar{display:none}
.exam-opts{flex-direction:column;gap:12px;align-items:stretch;text-align:left}
.exam-opts select{width:100%}
}
.loading{text-align:center;padding:60px 40px;color:var(--text2)}
.spinner{border:2.5px solid var(--border);border-top:2.5px solid var(--primary);border-radius:50%;width:28px;height:28px;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.result-card{text-align:center;padding:32px 24px}
.result-score{font-size:80px;font-weight:700;color:var(--text);line-height:1}
.result-detail{font-size:16px;color:var(--text2);margin:12px 0}
.result-bar{height:10px;background:var(--border);border-radius:5px;overflow:hidden;margin:12px 0}
.result-bar-fill{height:100%;border-radius:5px;transition:width 1.2s cubic-bezier(.25,.1,.25,1)}
.instructions{font-size:13px;color:var(--text2);line-height:1.8;padding:18px;background:var(--bg);border-radius:var(--radius)}
.instructions kbd{background:var(--card);border:1px solid var(--border);padding:2px 7px;border-radius:4px;font-size:11px;font-family:'SF Mono','Menlo',monospace}
.qnav-head{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:6px;font-size:12px;color:var(--text2)}
.qnav-jump-box{display:inline-flex;align-items:center;gap:6px}
.qnav-jump{width:76px;padding:5px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;background:var(--card);color:var(--text);-moz-appearance:textfield}
.qnav-jump::-webkit-outer-spin-button,.qnav-jump::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.qnav-jump:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,113,227,.1)}
.qnav-grid{display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.qnav-num{width:27px;height:27px;border-radius:6px;cursor:pointer;font-size:10px;font-weight:500;display:inline-flex;align-items:center;justify-content:center;border:1.5px solid var(--border);color:var(--text2);flex-shrink:0;transition:all .15s}
.qnav-num:hover{border-color:var(--primary);color:var(--primary)}
.qnav-num.current{box-shadow:0 0 0 2.5px var(--primary);border-color:var(--primary);font-weight:700;color:var(--primary);z-index:1;transform:scale(1.1)}
.qnav-num.correct{background:rgba(48,177,88,.1);border-color:var(--success);color:var(--success)}
.qnav-num.wrong{background:rgba(255,59,48,.08);border-color:var(--danger);color:var(--danger)}
.qnav-arrow{width:22px;height:22px;border-radius:6px;cursor:pointer;font-size:9px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border);color:var(--text2);flex-shrink:0;transition:all .15s}
.qnav-arrow:hover{border-color:var(--primary);color:var(--primary);background:var(--bg)}
.qnav-toggle{padding:3px 10px;border-radius:980px;cursor:pointer;font-size:10px;font-weight:500;border:1px solid var(--border);color:var(--text2);margin-left:6px;flex-shrink:0;white-space:nowrap;transition:all .15s}
.qnav-toggle:hover{border-color:var(--primary);color:var(--primary)}
.qnav-toggle.active{border-color:var(--primary);color:var(--primary);background:rgba(0,113,227,.06)}
</style>
</head>
<body>

<div class="header">
    <h1>🏗️ 安管人员安全生产考核刷题系统</h1>
    <div class="header-actions">
        <button class="btn btn-sm btn-outline" onclick="toggleTheme()"><span id="themeIcon">☀️</span> <span id="themeLabel">浅色</span></button>
    </div>
</div>

<div class="container">
    <!-- Main App -->
    <div id="mainContent">
        <!-- Category Tabs -->
        <div class="nav-tabs" id="categoryTabs">
            <div class="nav-tab active" data-cat="ALL" onclick="switchCategory('ALL')">📚 全部</div>
            <div class="nav-tab" data-cat="A" onclick="switchCategory('A')">A类</div>
            <div class="nav-tab" data-cat="B" onclick="switchCategory('B')">B类</div>
            <div class="nav-tab" data-cat="C1" onclick="switchCategory('C1')">C1类</div>
            <div class="nav-tab" data-cat="C2" onclick="switchCategory('C2')">C2类</div>
            <div class="nav-tab" data-cat="C3" onclick="switchCategory('C3')">C3类</div>
        </div>

        <!-- Mode Tabs -->
        <div class="nav-tabs" id="modeTabs">
            <div class="nav-tab active" data-mode="practice" onclick="switchMode('practice')">📝 章节练习</div>
            <div class="nav-tab" data-mode="exam" onclick="switchMode('exam')">⏱️ 模拟考试</div>
            <div class="nav-tab" data-mode="fav" onclick="switchMode('fav')">⭐ 收藏夹</div>
            <div class="nav-tab" data-mode="wrong" onclick="switchMode('wrong')">📕 错题本</div>
            <div class="nav-tab" data-mode="stats" onclick="switchMode('stats')">📊 进度统计</div>
        </div>

        <!-- Search & Filter -->
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 搜索题目关键词..." oninput="doSearch()">
        <div style="display:flex;gap:6px;margin:6px 0;flex-wrap:wrap" id="typeFilter">
            <span class="type-filter-btn type-filter-all active" data-type="all" onclick="setTypeFilter('all')" id="typeAllTag">📦 全部题型</span>
            <span class="type-filter-btn type-filter-judge" data-type="判断" onclick="setTypeFilter('判断')">✅ 判断题</span>
            <span class="type-filter-btn type-filter-single" data-type="单选" onclick="setTypeFilter('单选')">📋 单选题</span>
            <span class="type-filter-btn type-filter-multi" data-type="多选" onclick="setTypeFilter('多选')">📋 多选题</span>
        </div>

        <div class="load-banner hidden" id="loadBanner" onclick="retryLoads()"><span class="mini-spinner"></span><span id="loadBannerText">题库加载中…</span></div>

        <div class="stats-row" id="miniStats"></div>

        <!-- Practice View -->
        <div id="practiceView">
            <div class="card" id="questionCard">
                <div id="questionContent"></div>
                <div class="action-bar">
                    <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()">✅ 提交答案</button>
                    <button class="btn btn-outline" id="prevBtn" onclick="prevQuestion()">◀ 上一题</button>
                    <button class="btn btn-outline" id="nextBtn" onclick="nextQuestion()">下一题 ▶</button>
                    <button class="btn btn-sm btn-warning" id="wrongBookBtn" onclick="toggleWrongBook()">⭐ 收藏</button>
                </div>
                <div id="answerFeedback"></div>
            </div>
            <div class="card" id="questionNav" style="max-height:300px;overflow-y:auto"></div>
        </div>

        <!-- Exam View -->
        <div id="examView" class="hidden">
            <div class="card" style="text-align:center" id="examSetup">
                <h3 style="margin-bottom:16px;font-size:20px;font-weight:600">⏱️ 模拟考试</h3>
                <div class="exam-opts">
                    <div>
                        <label for="examCount">题目数量</label>
                        <select id="examCount">
                            <option value="30">30题</option>
                            <option value="50">50题</option>
                            <option value="100" selected>100题</option>
                            <option value="200">200题</option>
                        </select>
                    </div>
                    <div>
                        <label for="examTime">考试时间</label>
                        <select id="examTime">
                            <option value="45">45分钟</option>
                            <option value="60">60分钟</option>
                            <option value="90" selected>90分钟</option>
                            <option value="120">120分钟</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="startExam()" style="font-size:15px;padding:12px 36px">开始考试</button>
            </div>
            <div id="examRunning" class="hidden">
                <div class="card" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
                    <span style="font-weight:600"><span id="examProgress">1/1</span> 题</span>
                    <div class="timer" id="examTimer">90:00</div>
                    <button class="btn btn-danger btn-sm" onclick="confirmSubmitExam()">📝 交卷</button>
                </div>
                <div class="card" id="examQuestionCard">
                    <div id="examQuestionContent"></div>
                    <div class="action-bar">
                        <button class="btn btn-outline" onclick="examPrev()">◀ 上一题</button>
                        <button class="btn btn-outline" onclick="examNext()">下一题 ▶</button>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">📋 答题卡</div>
                    <div id="examAnswerGrid" style="display:flex;flex-wrap:wrap;gap:5px;max-height:300px;overflow-y:auto"></div>
                </div>
            </div>
            <div id="examResult" class="hidden">
                <div class="card result-card">
                    <h2 style="font-size:22px;font-weight:600;margin-bottom:16px">📊 考试结果</h2>
                    <div class="result-score" id="resultScore">0</div>
                    <div style="font-size:18px;color:var(--text2)">分</div>
                    <div class="result-detail" id="resultDetail"></div>
                    <div class="result-bar"><div class="result-bar-fill" id="resultBarFill" style="width:0;background:var(--success)"></div></div>
                    <button class="btn btn-primary" onclick="resetExam()" style="margin-top:20px">返回模拟考试</button>
                </div>
            </div>
        </div>

        <!-- Favorites View -->

[/教育培训|三级安全教育|安全交底|技术交底/,'安全教育培训与技术交底','《安全生产法》、《建设工程安全生产管理条例》','新工人三级安全教育：公司级→项目级→班组级，换工种、复工都要重新教育'],
[/职业病|职业危害|职业健康|粉尘|噪声/,'职业健康与危害防治','《职业病防治法》','职业病防护讲"三同时"：防护设施与主体工程同时设计、同时施工、同时投入使用'],

const EXP_FALLBACK='《安全生产法》、《建设工程安全生产管理条例》(国务院令第393号)及配套工程建设标准';
function expTopic(q){for(const[re,t,reg,hint]of EXP_TOPICS){if(re.test(q.stem))return{t:t,reg:reg,hint:hint};}return{t:'建筑施工安全生产综合管理',reg:EXP_FALLBACK,hint:''};}
function optText(opt){return(opt||'').replace(/^[A-E][、,，.．]\s*/,'');}
function pick(arr,seed){return arr[seed%arr.length];}
function buildExplanation(q){
const tp=expTopic(q);
const stem=q.stem;
const neg=/不属于|不正确|不符合|错误的|不包括|不应当|不得作为/.test(stem);
const seed=stem.length+stem.charCodeAt(0)+stem.charCodeAt(stem.length-1)+stem.charCodeAt(stem.length>>1);
const nums=(stem.match(/\d+(?:\.\d+)?\s*(?:人|米|mm|cm|m|天|日|小时|%|‰|万元|元|kg|t|级|年|次|倍|层|℃)/g)||[]).slice(0,3);
const numStr=nums.join('、');
let numUsed=false;
let body='';
if(q.type==='判断'){
if(q.answer==='A'){
if(nums.length){numUsed=true;body=pick(['说法<b>正确</b>，题干里的「'+numStr+'」正是规范定的数，这题考的就是这个数字，记牢它。','<b>正确</b>。「'+numStr+'」这个数值和规范原文一致——数字就是本题考点。','这句话<b>没错</b>，重点记「'+numStr+'」，下次见到改了数的版本要能认出来。'],seed);}
else body=pick(['说法<b>正确</b>，题干就是规范原文的意思，按原话记住就行。','<b>正确</b>。题干和规范要求完全一致，放心记。','这句话是<b>对的</b>，可以直接当结论背。','<b>正确</b>，这就是规范的要求，考试常按原文出题。','说法<b>没问题</b>，与现行规定相符，见到类似表述直接判对。'],seed);
}else{
if(nums.length){numUsed=true;body=pick(['<b>错误</b>。先盯住「'+numStr+'」核对——判断题十有八九是把数字改了。','这句话是<b>错的</b>，大概率就错在「'+numStr+'」这类数值或"应当/可以"的字眼上。','判<b>错</b>。带数字的判断题先怀疑数字：「'+numStr+'」很可能不是规范原文的数。'],seed);}
else body=pick(['说法<b>错误</b>，题干在规范原话上动了手脚，和原文对不上。','<b>错误</b>。这句话读着顺口，其实和规定不一致，别凭感觉判断。','这句话是<b>错的</b>，和现行规定不符。','<b>错误</b>。题干看着像那么回事，细究起来和规范要求有出入。','判<b>错</b>。这类题就是把正确说法改一两个词来挖坑，多留个心眼。'],seed);
}
}else if(q.type==='单选'){
const ci=q.answer.charCodeAt(0)-65;
const txt=optText(q.options[ci]);
const others=q.options.map((o,i)=>i===ci?null:optText(o)).filter(Boolean);
const shortOpts=others.length&&others.every(o=>o.length<=10);
if(neg)body=pick(['注意本题是选"错误项"：<b>'+q.answer+'</b>（'+txt+'）不符合规定，其余选项反而都是对的。','这题是反着问的，要挑出错误的一项：<b>'+q.answer+'</b>（'+txt+'）与规定不符，正是要选的。','看清题干里的"不"字——<b>'+q.answer+'</b>（'+txt+'）是唯一不符合规定的选项。','反向题：其他选项都对，就 <b>'+q.answer+'</b>（'+txt+'）不合规，选它。'],seed);
else if(shortOpts)body=pick(['正确答案 <b>'+q.answer+'</b>：'+txt+'。其余的「'+others.join('」「')+'」都是凑数的干扰项。','选 <b>'+q.answer+'</b>（'+txt+'）。「'+others.join('」「')+'」看着眼熟，但都不是规范定的那个。','答案 <b>'+q.answer+'</b>：'+txt+'。出题人拿「'+others.join('」「')+'」混淆视听，别上当。'],seed);
else body=pick(['正确答案是 <b>'+q.answer+'</b>：'+txt+'。','选 <b>'+q.answer+'</b>——'+txt+'，这是规范的标准说法。','答案 <b>'+q.answer+'</b>（'+txt+'），其余选项都有毛病，别被绕进去。','本题选 <b>'+q.answer+'</b>：'+txt+'。把它和题干连起来读一遍，就是完整的规范要求。','<b>'+q.answer+'</b> 正确——'+txt+'。记住这个组合，同类题换着花样考。'],seed);
}else{
const letters=q.answer.split('').join('、');
const corrects=q.answer.split('').map(L=>({L:L,t:optText(q.options[L.charCodeAt(0)-65])}));
const canList=corrects.length<=4&&corrects.every(c=>c.t.length<=16);
if(neg)body=pick(['这题是反向多选：<b>'+letters+'</b> 这几项不符合规定，正是要选的，注意题干里的否定词。','反向题，挑错误项：<b>'+letters+'</b> 都与规定不符，其余选项反而是对的。'],seed);
else if(canList)body=pick(['这几项都是规定要求：'+corrects.map(c=>c.L+'（'+c.t+'）').join('、')+'。一个都不能漏。','把「'+corrects.map(c=>c.L+'（'+c.t+'）').join('、')+'」打包记住，这就是本题的完整答案。'],seed);
else body=pick(['正确答案：<b>'+letters+'</b>，这几项都是规范明确要求的。多选题少选、错选都不得分。','本题应选 <b>'+letters+'</b>，没选进来的选项要么和题目无关，要么说法有误。','答案是 <b>'+letters+'</b>，逐项核对再提交，别漏选。','<b>'+letters+'</b> 全对。多选题稳妥做法：把每个选项当判断题逐个判一遍。'],seed);
}
let html=body;
const orig=(q.explanation||'').trim();
if(orig&&!EXP_GENERIC.test(orig))html+='<br>'+orig;
html+='<br><span style="color:var(--text2);font-size:13px">考点：'+tp.t+'（'+tp.reg+'）</span>';
const tips=[];
if(tp.hint)tips.push(tp.hint);
if(nums.length&&!numUsed)tips.push(pick(['带数字的题最爱改数设错，把规范原文的数记死。','数字考点重复率高，今天记住这个数，考场直接拿分。'],seed));
if(/建设单位|施工单位|监理单位|总承包|分包|勘察单位|设计单位/.test(stem))tips.push(pick(['建设、施工、监理各管一摊，考题最爱张冠李戴，看清主语再判断。','职责类题先看主语是谁——主体一换，对错就反转。'],seed));
if(/立即|及时报告|\d+\s*小时内|\d+\s*日内|当日/.test(stem))tips.push('"几小时内、几日内"这类时限必须记精确，模糊记忆等于没记。');
if(tips.length)html+='<br><span style="font-size:13px">💡 '+pick(tips,Math.floor(seed/3))+'</span>';
return html;
}
function renderPractice(){const qs=S.filtered;if(!qs.length){document.getElementById('questionContent').innerHTML='<div style=\"text-align:center;padding:40px;color:var(--text2)\">'+(catsPending()?'⏳ 题库加载中，请稍候…':'😕 没有找到匹配的题目，请调整筛选条件')+'</div>';document.getElementById('questionNav').innerHTML='';document.getElementById('submitBtn').classList.add('hidden');document.getElementById('nextBtn').disabled=true;document.getElementById('prevBtn').disabled=true;return;}const idx=Math.min(S.currentIdx,qs.length-1);const q=qs[idx];const qKey=QK(q);const prevResult=S.questionHistory[qKey];const typeClass=TC(q);let html='<div class=\"question-stem\"><span class=\"q-num\">#'+(idx+1)+'/'+qs.length+'</span> <span class=\"tag tag-'+typeClass+'\">'+q.type+'题</span> <span style=\"color:var(--text2);font-size:11px\">['+q.category+']</span><br><br>'+q.stem+'</div><div id=\"optionsList\">';q.options.forEach((opt,i)=>{const letter=String.fromCharCode(65+i);let cls='option-item';if(S.selectedOpts.includes(i))cls+=' selected';if(S.answerState==='answered'){const corrects=q.answer.split('');if(corrects.includes(letter))cls+=' correct';else if(S.selectedOpts.includes(i)&&!corrects.includes(letter))cls+=' wrong';}const onclick=S.answerState!=='answered'?'onclick=\"selectOption('+i+')\"':'';html+='<div class=\"'+cls+'\" '+onclick+'><span class=\"opt-label\">'+letter+'.</span>'+opt.replace(/^[A-E][、,，]\s*/,'')+'</div>';});html+='</div>';document.getElementById('questionContent').innerHTML=html;document.getElementById('answerFeedback').innerHTML='';const sb=document.getElementById('submitBtn');sb.classList.remove('hidden');sb.disabled=S.answerState==='answered';sb.textContent=S.answerState==='answered'?'✅ 已提交':'✅ 提交答案';sb.style.opacity=S.answerState==='answered'?'0.5':'1';document.getElementById('nextBtn').disabled=S.currentIdx>=qs.length-1;document.getElementById('prevBtn').disabled=S.currentIdx<=0;const favKey=QK(q);const isFaved=!!S.favorites[favKey];document.getElementById('wrongBookBtn').textContent=isFaved?'⭐ 已收藏':'☆ 收藏';document.getElementById('wrongBookBtn').className=isFaved?'btn btn-sm btn-warning':'btn btn-sm btn-outline';if(S.answerState==='answered'){const correct=checkAnswer(q);const fbCls=correct?'correct-ans':'wrong-ans';const fbTxt=correct?'✅ 回答正确！':'❌ 回答错误';document.getElementById('answerFeedback').innerHTML='<div class=\"answer-display '+fbCls+'\">'+fbTxt+' 正确答案：<b>'+q.answer+'</b></div><div class=\"explanation-box\"><div class=\"exp-title\">📖 解析</div>'+buildExplanation(q)+'</div>';}else if(prevResult){const fbCls=prevResult==='correct'?'correct-ans':'wrong-ans';const fbTxt=prevResult==='correct'?'✅ 上次回答正确！':'❌ 上次回答错误';document.getElementById('answerFeedback').innerHTML='<div class=\"answer-display '+fbCls+'\">'+fbTxt+' 正确答案：<b>'+q.answer+'</b></div><div class=\"explanation-box\"><div class=\"exp-title\">📖 解析</div>'+buildExplanation(q)+'</div>';}renderQuestionNav();}
function selectOption(idx){const q=S.filtered[S.currentIdx];if(q.type==='单选'||q.type==='判断')S.selectedOpts=[idx];else if(q.type==='多选'){const ei=S.selectedOpts.indexOf(idx);if(ei>=0)S.selectedOpts.splice(ei,1);else S.selectedOpts.push(idx);}renderPractice();}
function submitAnswer(){if(!S.selectedOpts.length)return;S.answerState='answered';const q=S.filtered[S.currentIdx];const qKey=QK(q);const ua=S.selectedOpts.map(i=>String.fromCharCode(65+i)).sort().join('');const correct=ua===q.answer;S.questionHistory[qKey]=correct?'correct':'wrong';saveQuestionHistory();const cat=q.category.replace('类','');if(!S.progress[cat])S.progress[cat]={total:0,correct:0,byType:{}};S.progress[cat].total++;if(correct)S.progress[cat].correct++;if(!S.progress[cat].byType[q.type])S.progress[cat].byType[q.type]={total:0,correct:0};S.progress[cat].byType[q.type].total++;if(correct)S.progress[cat].byType[q.type].correct++;saveProgress();if(!correct){S.wrongBook[qKey]={...q,wc:(S.wrongBook[qKey]?.wc||0)+1,lw:Date.now()};saveWrongBook();}else if(S.wrongBook[qKey]){delete S.wrongBook[qKey];saveWrongBook();}renderPractice();updateMiniStats();}
function nextQuestion(){if(S.currentIdx<S.filtered.length-1){S.currentIdx++;RS();renderPractice();}}
function prevQuestion(){if(S.currentIdx>0){S.currentIdx--;RS();renderPractice();}}
function checkAnswer(q){return S.selectedOpts.map(i=>String.fromCharCode(65+i)).sort().join('')===q.answer;}
function toggleWrongBook(){const q=S.filtered[S.currentIdx];const key=QK(q);if(S.favorites[key]){delete S.favorites[key];}else{S.favorites[key]={...q,ts:Date.now()};}saveFavorites();renderPractice();}
function renderQuestionNav(){const qs=S.filtered;const total=qs.length;const PER_PAGE=30;let navStart=S.currentIdx-Math.floor(PER_PAGE/2);let navEnd=navStart+PER_PAGE;if(navStart<0){navStart=0;navEnd=Math.min(PER_PAGE,total);}if(navEnd>total){navEnd=total;navStart=Math.max(0,navEnd-PER_PAGE);}if(showAllNav){navStart=0;navEnd=Math.min(total,100);}let html='<div class=\"qnav-head\"><span>共 <b>'+total+'</b> 题（'+(navStart+1)+'-'+navEnd+'）| <span style=\"color:var(--success)\">●</span>正确 <span style=\"color:var(--danger)\">●</span>错误 <span style=\"color:var(--border)\">●</span>未答</span><span class=\"qnav-jump-box\"><input type=\"number\" inputmode=\"numeric\" class=\"qnav-jump\" id=\"qnavJumpInput\" min=\"1\" max=\"'+total+'\" placeholder=\"题号\" onkeydown=\"if(event.key===\'Enter\')jumpToNum()\"><span class=\"qnav-toggle\" onclick=\"jumpToNum()\">跳转 →</span></span></div>';html+='<div class=\"qnav-grid\">';if(navStart>0){html+='<span class=\"qnav-arrow\" onclick=\"jumpToNavPage('+(navStart-1)+')\" title=\"上一页\">◀</span>';}for(let i=navStart;i<navEnd;i++){const q=qs[i];const qKey=QK(q);const result=S.questionHistory[qKey];let cls='qnav-num';if(i===S.currentIdx)cls+=' current';if(result==='correct')cls+=' correct';else if(result==='wrong')cls+=' wrong';html+='<span class=\"'+cls+'\" onclick=\"jumpToQuestion('+i+')\">'+(i+1)+'</span>';}if(navEnd<total){html+='<span class=\"qnav-arrow\" onclick=\"jumpToNavPage('+navEnd+')\" title=\"下一页\">▶</span>';}if(showAllNav){html+='<span class=\"qnav-toggle active\" onclick=\"showAllNav=false;renderQuestionNav()\">🔄 恢复</span>';}else{html+='<span class=\"qnav-toggle\" onclick=\"showAllNav=true;renderQuestionNav()\">📋 展开</span>';}html+='</div>';document.getElementById('questionNav').innerHTML=html;}
let showAllNav=false;
function jumpToNavPage(tgt){showAllNav=false;S.currentIdx=Math.max(0,Math.min(S.filtered.length-1,tgt));RS();renderPractice();}
function jumpToQuestion(idx){showAllNav=false;S.currentIdx=idx;RS();renderPractice();}
function jumpToNum(){const inp=document.getElementById('qnavJumpInput');const v=parseInt(inp.value,10);const total=S.filtered.length;if(!v||!total)return;S.currentIdx=Math.max(0,Math.min(total-1,v-1));showAllNav=false;RS();renderPractice();}
function startExam(){const count=parseInt(document.getElementById('examCount').value);const timeMin=parseInt(document.getElementById('examTime').value);const pool=S.filtered.length?[...S.filtered]:[...S.questions];if(!pool.length){alert(catsPending()?'题库还在加载中，请稍候再试':'当前筛选条件下没有题目，请调整筛选条件');return;}for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}S.exam.questions=pool.slice(0,Math.min(count,pool.length));S.exam.answers={};S.exam.idx=0;S.exam.timeLeft=timeMin*60;S.exam.totalTime=timeMin*60;S.exam.active=true;document.getElementById('examSetup').classList.add('hidden');document.getElementById('examRunning').classList.remove('hidden');document.getElementById('examResult').classList.add('hidden');renderExamQuestion();if(S.exam.timer)clearInterval(S.exam.timer);S.exam.timer=setInterval(()=>{S.exam.timeLeft--;updateExamTimer();if(S.exam.timeLeft<=0)submitExam();},1000);}
function updateExamTimer(){const m=Math.floor(S.exam.timeLeft/60),s=S.exam.timeLeft%60;const el=document.getElementById('examTimer');el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');el.classList.toggle('warning',S.exam.timeLeft<300);document.getElementById('examProgress').textContent=(S.exam.idx+1)+'/'+S.exam.questions.length;}
function renderExamQuestion(){if(!S.exam.questions.length)return;const q=S.exam.questions[S.exam.idx];const saved=S.exam.answers[S.exam.idx]||[];const tc=TC(q);let html='<div class=\"question-stem\"><span class=\"q-num\">#'+(S.exam.idx+1)+'/'+S.exam.questions.length+'</span> <span class=\"tag tag-'+tc+'\">'+q.type+'题</span> <span style=\"color:var(--text2);font-size:11px\">['+q.category+']</span><br><br>'+q.stem+'</div><div>';q.options.forEach((opt,i)=>{let cls='option-item';if(saved.includes(i))cls+=' selected';html+='<div class=\"'+cls+'\" onclick=\"selectExamOpt('+i+')\"><span class=\"opt-label\">'+String.fromCharCode(65+i)+'.</span>'+opt.replace(/^[A-E][、,，]\s*/,'')+'</div>';});html+='</div>';document.getElementById('examQuestionContent').innerHTML=html;renderExamSheet();}
function selectExamOpt(idx){const q=S.exam.questions[S.exam.idx];let saved=S.exam.answers[S.exam.idx]||[];if(q.type==='单选'||q.type==='判断')saved=[idx];else{const ei=saved.indexOf(idx);if(ei>=0)saved.splice(ei,1);else saved.push(idx);}S.exam.answers[S.exam.idx]=saved;renderExamQuestion();}
function examPrev(){if(S.exam.idx>0){S.exam.idx--;renderExamQuestion();}}
function examNext(){if(S.exam.idx<S.exam.questions.length-1){S.exam.idx++;renderExamQuestion();}}
function renderExamSheet(){let html='';for(let i=0;i<S.exam.questions.length;i++){const answered=(S.exam.answers[i]||[]).length>0;let cls='sheet-num';if(answered)cls+=' answered';if(i===S.exam.idx)cls+=' current';html+='<div class=\"'+cls+'\" onclick=\"S.exam.idx='+i+';renderExamQuestion()\">'+(i+1)+'</div>';}document.getElementById('examAnswerGrid').innerHTML=html;}
function confirmSubmitExam(){const total=S.exam.questions.length;let answered=0;for(let i=0;i<total;i++){if((S.exam.answers[i]||[]).length)answered++;}const un=total-answered;if(un>0&&!confirm('还有 '+un+' 题未作答，确定要交卷吗？'))return;if(un===0&&!confirm('确定交卷吗？'))return;submitExam();}
function submitExam(){if(S.exam.timer)clearInterval(S.exam.timer);S.exam.active=false;let correct=0;const total=S.exam.questions.length;for(let i=0;i<total;i++){const q=S.exam.questions[i];const ua=(S.exam.answers[i]||[]).map(idx=>String.fromCharCode(65+idx)).sort().join('');const isCorrect=ua===q.answer;if(isCorrect)correct++;else{const key=QK(q);S.wrongBook[key]={...q,wc:(S.wrongBook[key]?.wc||0)+1,lw:Date.now()};}const qKey=QK(q);S.questionHistory[qKey]=isCorrect?'correct':'wrong';}saveQuestionHistory();saveWrongBook();const score=Math.round((correct/total)*100);document.getElementById('examRunning').classList.add('hidden');document.getElementById('examResult').classList.remove('hidden');document.getElementById('resultScore').textContent=score;document.getElementById('resultDetail').textContent='正确 '+correct+' 题 / 共 '+total+' 题 | 用时 '+Math.floor((S.exam.totalTime-S.exam.timeLeft)/60)+'分'+(S.exam.totalTime-S.exam.timeLeft)%60+'秒';const bar=document.getElementById('resultBarFill');bar.style.width=score+'%';bar.style.background=score<60?'var(--danger)':score<80?'var(--warning)':'var(--success)';}
function resetExam(){if(S.exam.timer)clearInterval(S.exam.timer);S.exam={active:false,questions:[],answers:{},idx:0,timer:null,timeLeft:0,totalTime:0};document.getElementById('examSetup').classList.remove('hidden');document.getElementById('examRunning').classList.add('hidden');document.getElementById('examResult').classList.add('hidden');}
function renderFavorites(){const entries=Object.values(S.favorites);document.getElementById('favEmpty').classList.toggle('hidden',entries.length>0);entries.sort((a,b)=>(b.ts||0)-(a.ts||0));let html='';entries.forEach((q,idx)=>{const tc=TC(q);html+='<div class=\"wrong-list-item\" onclick=\"reviewFav(\''+(QK(q))+'\')\" style=\"display:flex;align-items:center;gap:8px\"><span style=\"color:var(--text2);font-size:12px\">#'+(idx+1)+'</span><span class=\"tag tag-'+tc+'\">'+q.type+'</span><span style=\"color:var(--text2);font-size:11px\">['+q.category+']</span><span style=\"flex:1\">'+q.stem.substring(0,60)+'...</span><span style=\"cursor:pointer;color:var(--danger)\" onclick=\"event.stopPropagation();delete S.favorites[\''+(QK(q))+'\'];saveFavorites();renderFavorites();\">✕</span></div>';});document.getElementById('favList').innerHTML=html;}
function reviewFav(key){const q=S.favorites[key];if(!q)return;S.filtered=[q];S.currentIdx=0;RS();switchMode('practice');}
function clearFavorites(){if(confirm('确定要清空所有收藏吗？')){S.favorites={};saveFavorites();renderFavorites();}}
function saveFavorites(){localStorage.setItem('hnsafety_fv',JSON.stringify(S.favorites));}
function renderWrongBook(){const entries=Object.values(S.wrongBook);document.getElementById('wrongEmpty').classList.toggle('hidden',entries.length>0);entries.sort((a,b)=>(b.lw||0)-(a.lw||0));let html='';entries.forEach((q,idx)=>{const tc=TC(q);html+='<div class=\"wrong-list-item\" onclick=\"reviewWrong(\''+(QK(q))+'\')\" style=\"display:flex;align-items:center;gap:8px\"><span style=\"color:var(--text2);font-size:12px\">#'+(idx+1)+'</span><span class=\"tag tag-'+tc+'\">'+q.type+'</span><span style=\"color:var(--text2);font-size:11px\">['+q.category+']</span><span style=\"flex:1\">'+q.stem.substring(0,60)+'...</span><span style=\"color:var(--danger);font-weight:600\">✘'+(q.wc||1)+'</span></div>';});document.getElementById('wrongList').innerHTML=html;}
function reviewWrong(key){const q=S.wrongBook[key];if(!q)return;S.filtered=[q];S.currentIdx=0;RS();switchMode('practice');}
function clearWrongBook(){if(confirm('确定要清空所有错题吗？此操作不可撤销。')){S.wrongBook={};saveWrongBook();renderWrongBook();updateMiniStats();}}
function renderStats(){const cats=['A','B','C1','C2','C3'];let html='';let totQ=0,totA=0,totC=0;for(const cat of cats){const p=S.progress[cat]||{total:0,correct:0};totA+=p.total;totC+=p.correct;const catQs=S.questions.filter(q=>q.category===cat+'类').length;totQ+=catQs;const pct=p.total>0?Math.round((p.correct/p.total)*100):0;html+='<div class=\"stat-card\"><div class=\"stat-num\">'+pct+'%</div><div class=\"stat-label\">'+cat+'类 正确率 ('+p.correct+'/'+p.total+')</div><div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:'+pct+'%\"></div></div></div>';}html+='<div class=\"stat-card\"><div class=\"stat-num\">'+Object.keys(S.wrongBook).length+'</div><div class=\"stat-label\">错题数</div></div><div class=\"stat-card\"><div class=\"stat-num\">'+totQ+'</div><div class=\"stat-label\">题库总数</div></div><div class=\"stat-card\"><div class=\"stat-num\">'+totA+'</div><div class=\"stat-label\">已练习</div></div>';document.getElementById('statsCards').innerHTML=html;let detail='';for(const cat of cats){const p=S.progress[cat]||{total:0,correct:0,byType:{}};detail+='<div style=\"margin:6px 0\"><strong>'+cat+'类：</strong>';for(const type of['判断','单选','多选']){const tp=p.byType[type]||{total:0,correct:0};const pct=tp.total>0?Math.round((tp.correct/tp.total)*100):0;detail+='<span class=\"tag tag-'+(type==='判断'?'judge':type==='单选'?'single':'multi')+'\">'+type+': '+pct+'% ('+tp.correct+'/'+tp.total+')</span> ';}detail+='</div>';}document.getElementById('categoryProgress').innerHTML=detail||'<p style=\"color:var(--text2);padding:16px\">暂无练习记录，开始刷题吧！</p>';}
function saveWrongBook(){localStorage.setItem('hnsafety_wb',JSON.stringify(S.wrongBook));}
function saveProgress(){localStorage.setItem('hnsafety_pr',JSON.stringify(S.progress));}
function toggleTheme(){const cur=document.documentElement.getAttribute('data-theme')||'';const themes=['','dark','eye'];const icons={'':'☀️','dark':'🌙','eye':'🌿'};const labels={'':'浅色','dark':'深色','eye':'护眼'};const curIdx=themes.indexOf(cur);const nextIdx=(curIdx+1)%themes.length;const next=themes[nextIdx];document.documentElement.setAttribute('data-theme',next);localStorage.setItem('hnsafety_theme',next);document.getElementById('themeIcon').textContent=icons[next];document.getElementById('themeLabel').textContent=labels[next];}
(function(){const saved=localStorage.getItem('hnsafety_theme');if(saved)document.documentElement.setAttribute('data-theme',saved);const icons={'':'☀️','dark':'🌙','eye':'🌿'};const labels={'':'浅色','dark':'深色','eye':'护眼'};const cur=document.documentElement.getAttribute('data-theme')||'';document.getElementById('themeIcon').textContent=icons[cur]||'☀️';document.getElementById('themeLabel').textContent=labels[cur]||'浅色';})();
document.addEventListener('keydown',function(e){const tag=e.target&&e.target.tagName;if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;if(S.exam.active&&S.mode==='exam'){if(e.key==='ArrowLeft'){e.preventDefault();examPrev();}if(e.key==='ArrowRight'){e.preventDefault();examNext();}const n=parseInt(e.key);if(n>=1&&n<=5){e.preventDefault();selectExamOpt(n-1);}return;}if(S.mode==='practice'){if(S.answerState!=='answered'){const n=parseInt(e.key);if(n>=1&&n<=5){e.preventDefault();selectOption(n-1);}if(e.key==='Enter'){e.preventDefault();submitAnswer();}}if(e.key==='ArrowRight'){e.preventDefault();nextQuestion();}if(e.key==='ArrowLeft'){e.preventDefault();prevQuestion();}}});
function initApp(){CACHE();loadData();document.getElementById('mainContent').classList.remove('hidden');const savedCat=localStorage.getItem('hnsafety_cat')||'ALL';switchCategory(CAT_LIST.includes(savedCat)||savedCat==='ALL'?savedCat:'ALL');switchMode('practice');}
document.addEventListener('DOMContentLoaded',initApp);
if('serviceWorker' in navigator&&location.protocol!=='file:')window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});
</script>
