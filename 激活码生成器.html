<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>激活码生成器 - 安管人员刷题系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,'Microsoft YaHei',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:12px;padding:28px;max-width:500px;width:90%;box-shadow:0 2px 12px rgba(0,0,0,.1)}
h2{font-size:20px;margin-bottom:6px;color:#1a73e8}
.subtitle{font-size:13px;color:#999;margin-bottom:20px}
label{display:block;font-size:14px;color:#666;margin:16px 0 4px;font-weight:500}
input{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:8px;font-size:16px;margin:4px 0;font-family:monospace;letter-spacing:1px}
input:focus{outline:none;border-color:#1a73e8}
.btn{padding:12px 24px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;margin:4px}
.btn-primary{background:#1a73e8;color:#fff}.btn-primary:hover{background:#1557b0}
.result{margin-top:16px;padding:20px;background:#e8f0fe;border-radius:10px;font-family:monospace;font-size:20px;text-align:center;letter-spacing:3px;color:#1a73e8;font-weight:700}
.note{margin-top:20px;font-size:12px;color:#999;line-height:1.8}
.warning{margin-top:16px;padding:12px;background:#fce8e6;border-radius:8px;font-size:13px;color:#d93025;line-height:1.6}
</style>
</head>
<body>
<div class="card">
    <h2>🔑 激活码生成器</h2>
    <p class="subtitle">一机一码 · 严格绑定 · 无万能码</p>

    <label>用户机器码（16位）：</label>
    <input type="text" id="machineInput" placeholder="用户提供，如：A3F8C2D1E5B9A7C3" maxlength="16" oninput="generate()" autocomplete="off">

    <label>生成的专属激活码：</label>
    <div class="result" id="result">等待输入机器码...</div>

    <button class="btn btn-primary" onclick="copyCode()">📋 复制激活码</button>

    <div class="warning">
        ⚠️ <b>已移除万能激活码。</b><br>
        每个激活码严格绑定一台设备，不同电脑不可共用。<br>
        用户清除浏览器数据后机器码会变化，需重新激活。
    </div>

    <div class="note">
        📌 <b>使用流程：</b><br>
        ① 用户打开刷题网页，看到16位机器码<br>
        ② 用户将机器码发给你<br>
        ③ 你在此输入机器码 → 生成激活码<br>
        ④ 将激活码发给用户完成激活
    </div>
</div>

<script>
// EXACT SAME algorithm as in the main app
function generate() {
    const deviceId = document.getElementById('machineInput').value.trim().toUpperCase();
    if (!deviceId || deviceId.length < 16) {
        document.getElementById('result').textContent = '需要完整16位机器码...';
        return;
    }

    let seed = 0;
    for (let i = 0; i < deviceId.length; i++) {
        seed = ((seed << 5) - seed) + deviceId.charCodeAt(i);
        seed |= 0;
    }
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code = '';
    seed = Math.abs(seed);
    for (let i = 0; i < 16; i++) {
        seed = (seed * 1103515245 + 12345) & 0x7FFFFFFF;
        code += chars[seed % chars.length];
        if (i === 3 || i === 7 || i === 11) code += '-';
    }
    document.getElementById('result').textContent = 'HNJZ-' + code.substring(5);
}

function copyCode() {
    const code = document.getElementById('result').textContent;
    if (code && code.includes('HNJZ-')) {
        navigator.clipboard.writeText(code).then(() => alert('激活码已复制！'));
    }
}
</script>
</body>
</html>
